services:
  mariadb:
    image: mariadb:10.8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed # Temporary fix for MariaDB 10.6
    environment:
      MYSQL_ROOT_PASSWORD: 123
    volumes:
      - mariadb-data:/var/lib/mysql

  redis:
    image: redis:alpine

  frappe:
    # latest ships a broken 0-byte bench binary; pin a working release
    image: frappe/bench:v5.30.0
    depends_on:
      - mariadb
      - redis
    command: bash /workspace/init.sh
    environment:
      - SHELL=/bin/bash
    working_dir: /home/frappe
    volumes:
      - .:/workspace
      # Live bind-mount: edits to the Organization Structure module on the host
      # are reflected instantly inside the container (no docker cp needed).
      - ../hrms/organization_structure:/home/frappe/frappe-bench/apps/hrms/hrms/organization_structure
      - frappe-bench:/home/frappe/frappe-bench
    ports:
      - 8000:8000
      - 9000:9000

volumes:
  mariadb-data:
  frappe-bench:
